        // --- 核心運算邏輯 --- [cite: 18, 19]
        function calculate() {
            const dateStr = document.getElementById('birthday').value;
            if (!dateStr) return;

            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();

            // 生命靈數
            const digits = dateStr.replace(/\D/g, '').split('').map(Number);
            let numSum = digits.reduce((a, b) => a + b, 0);
            while (numSum > 9) numSum = numSum.toString().split('').map(Number).reduce((a, b) => a + b, 0);
            
            // 星座
            const monthDay = `${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
            const zodiac = ZODIAC_DATA.find(z => (z.start <= z.end) ? (monthDay >= z.start && monthDay <= z.end) : (monthDay >= z.start || monthDay <= z.end));
            
            // 生肖
            const animal = CHINESE_ZODIAC_LIST[(year - 1900) % 12];

            renderResults(numSum, zodiac, animal);
            document.getElementById('input-panel').classList.add('hidden');
            document.getElementById('result-panel').classList.remove('hidden');
        }

        function renderResults(num, zodiac, animal) {
            const container = document.getElementById('results-content');
            container.innerHTML = `
                ${createCard(`Life Path ${num} · ${NUMEROLOGY_DATA[num].key}`, NUMEROLOGY_DATA[num].name, num, NUMEROLOGY_DATA[num])}
                ${createCard(`Zodiac · ${zodiac.name}`, zodiac.crystal, 'zodiac', zodiac, zodiac.name)}
                ${createCard(`Soul Sign · ${animal}`, CHINESE_ZODIAC_DATA[animal].crystal, animal, CHINESE_ZODIAC_DATA[animal])}
            `;
            lucide.createIcons();
        }

        function createCard(sub, label, iconType, data, zodiacName = null) {
            let iconHtml = '';
            if (zodiacName) {
                iconHtml = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-8 h-8 ${data.color}"><path d="${ZODIAC_ICONS[zodiacName]}"/></svg>`;
            } else if (typeof iconType === 'number') {
                iconHtml = `<span class="text-3xl font-bold ${data.color}">${iconType}</span>`;
            } else {
                iconHtml = `<span class="text-2xl font-bold ${data.color} opacity-60">${iconType}</span>`;
            }

            return `
            <div class="p-6 rounded-[2rem] ${data.bgColor} border border-white shadow-sm relative overflow-hidden">
                <div class="absolute inset-0 border-2 ${data.border} rounded-[2rem] opacity-30"></div>
                <div class="flex items-start gap-5 relative z-10">
                    <div class="w-14 h-14 rounded-2xl ${data.lightAccent} flex items-center justify-center flex-shrink-0 border border-white shadow-sm">${iconHtml}</div>
                    <div class="flex-1">
                        <div class="text-[10px] ${data.color} font-bold tracking-widest uppercase mb-1 opacity-80">${sub}</div>
                        <h3 class="text-xl font-bold ${data.color}">${label}</h3>
                        <p class="text-stone-500 text-sm italic mt-1">${data.benefit}</p>
                    </div>
                </div>
                <div class="mt-5 relative pl-5 py-2 z-10">
                    <div class="absolute left-0 top-0 bottom-0 w-[2px] ${data.accent} opacity-30"></div>
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-[10px] font-bold tracking-widest text-stone-300 uppercase">Destined Scent</span>
                    </div>
                    <div class="flex items-baseline gap-2"><h4 class="text-lg font-bold ${data.color}">${data.oil}</h4><span class="text-xs text-stone-400 italic">${data.oilEn}</span></div>
                    <p class="text-stone-500 text-xs mt-1 font-light leading-relaxed">${data.oilBenefit}</p>
                </div>
            </div>`;
        }

        // --- 圖冊功能 --- [cite: 17]
        function openLibrary() { document.getElementById('library-modal').classList.remove('hidden'); switchTab('num'); }
        function closeLibrary() { document.getElementById('library-modal').classList.add('hidden'); }
        function switchTab(tabId) {
            ['num', 'zodiac', 'animal'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.className = (t === tabId) ? "flex-1 py-3 rounded-xl text-xs font-bold bg-white text-stone-800 shadow-sm border border-stone-100" : "flex-1 py-3 rounded-xl text-xs font-bold text-stone-400";
            });
            const list = document.getElementById('library-list');
            let html = '';
            if (tabId === 'num') Object.entries(NUMEROLOGY_DATA).forEach(([k, d]) => html += createCard(`Path ${k} · ${d.key}`, d.name, parseInt(k), d));
            else if (tabId === 'zodiac') ZODIAC_DATA.filter((v,i,a) => a.findIndex(t=>(t.name===v.name))===i).forEach(d => html += createCard(`Zodiac · ${d.name}`, d.crystal, 'zodiac', d, d.name));
            else CHINESE_ZODIAC_LIST.forEach(n => html += createCard(`Soul Sign · ${n}`, CHINESE_ZODIAC_DATA[n].crystal, n, CHINESE_ZODIAC_DATA[n]));
            list.innerHTML = html;
            lucide.createIcons();
        }

        lucide.createIcons();
    </script>
</body>
